name: Naarya
description: "Naarya — Happier and Healthier SHE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.3.0
  intl: ^0.20.0
  table_calendar: ^3.2.0
  fl_chart: ^0.70.2
  flutter_markdown: ^0.7.7
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.17
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/naarya_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/content/
